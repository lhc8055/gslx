<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黑洞Loader - Uiverse.io by StealthWorm</title>
    <!-- 原作品使用的Fira Sans字体引入，保证视觉完全还原 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* 全局样式重置，清除浏览器默认边距，保证跨设备效果一致 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 深色背景+居中布局，还原原作品的展示环境 */
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #121212;
        }

        /* 以下为原作者完整CSS代码，未做任何修改 */
        /* From Uiverse.io by StealthWorm */ 
        .loader {
          display: flex;
          width: 8rem;
          height: 8rem;
          justify-content: center;
          align-items: center;
          position: relative;
          flex-direction: column;
        }

        .curve {
          width: 180%;
          height: 180%;
          position: absolute;
          animation: rotate 8s linear infinite;
          fill: transparent;
        }

        .curve text {
          letter-spacing: 20px;
          text-transform: uppercase;
          font: 1.5em "Fira Sans", sans-serif;
          fill: white;
          filter: drop-shadow(0 2px 8px black);
        }

        .blackhole {
          z-index: -1;
          display: flex;
          position: absolute;
          width: 8rem;
          height: 8rem;
          align-items: center;
          justify-content: center;
        }

        .blackhole-circle {
          z-index: 0;
          display: flex;
          width: 100%;
          height: 100%;
          border-radius: 50%;
          background: radial-gradient(circle at center, black 25%, white 35%, white 100%);
          box-shadow: 0px 0px 2rem #c2babb;
          align-items: center;
          justify-content: center;
        }

        .blackhole-circle::after {
          z-index: 0;
          position: absolute;
          content: "";
          display: flex;
          width: 100%;
          height: 100%;
          border-radius: 50%;
          border: 4px solid white;
          background: radial-gradient(circle at center, black 35%, white 60%, white 100%);
          box-shadow: 0px 0px 5rem #c2babb;
          align-items: center;
          justify-content: center;
          filter: blur(4px);
          animation: pulseAnimation linear infinite 2s alternate-reverse;
        }

        .blackhole-circle::before {
          z-index: 1;
          content: "";
          display: flex;
          width: 4rem;
          height: 4rem;
          border: 2px solid #ffffff;
          box-shadow: 3px 3px 10px #c2babb, inset 0 0 1rem #ffffff;
          border-radius: 50%;
          top: 5rem;
          filter: blur(0.5px);
          animation: rotate linear infinite 3s;
        }

        .blackhole-disc {
          position: absolute;
          z-index: 0;
          display: flex;
          width: 5rem;
          height: 10rem;
          border-radius: 50%;
          background: radial-gradient(circle at center, #ffffff 80%, #353535 90%, white 100%);
          filter: blur(1rem) brightness(130%);
          border: 1rem solid white;
          box-shadow: 0px 0px 3rem #d7c4be;
          transform: rotate3d(1, 1, 1, 220deg);
          animation: pulseAnimation2 linear infinite 2s alternate-reverse;
          justify-content: center;
          align-items: center;
        }

        .blackhole-disc::before {
          content: "";
          position: absolute;
          z-index: 0;
          display: flex;
          width: 5rem;
          height: 10rem;
          border-radius: 50%;
          background: radial-gradient(circle at center, #ffffff 80%, #353535 90%, white 100%);
          filter: blur(3rem);
          border: 1rem solid white;
          box-shadow: 0px 0px 6rem #d7c4be;
          animation: pulseAnimation linear infinite 2s alternate-reverse;
        }

        @keyframes rotate {
          0% {
            transform: rotate(0deg);
          }

          100% {
            transform: rotate(360deg);
          }
        }

        @keyframes pulseAnimation {
          0% {
            box-shadow: 0px 0px 3rem #c2babb;
            transform: scale(1);
          }

          100% {
            box-shadow: 0px 0px 5rem #c2babb;
            transform: scale(1.09);
          }
        }

        @keyframes pulseAnimation2 {
          0% {
            box-shadow: 0px 0px 3rem #c2babb;
            transform: rotate3d(1, 1, 1, 220deg) scale(1);
          }

          100% {
            box-shadow: 0px 0px 5rem #c2babb;
            transform: rotate3d(1, 1, 1, 220deg)  scale(.95);
          }
        }
    </style>
</head>
<body>
    <!-- 原作者完整HTML结构，仅补充SVG标准命名空间，保证所有浏览器正常渲染 -->
    <!-- From Uiverse.io by StealthWorm --> 
    <div class="loader">
      <div class="blackhole">
        <div class="blackhole-circle"></div>
        <div class="blackhole-disc"></div>
      </div>

      <div class="curve">
        <svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
          <path id="loading" d="M73.2,148.6c4-6.1,65.5-96.8,178.6-95.6c111.3,1.2,170.8,90.3,175.1,97"></path>
          <text width="500">
            <textPath xlink:href="#loading">
              loading...
            </textPath>
          </text>
        </svg>
      </div>
    </div>
</body>
</html>
